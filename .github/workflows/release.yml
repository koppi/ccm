name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build .deb for ${{ matrix.arch }} Ubuntu ${{ matrix.ubuntu_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu_version:
          - version: "20.04"
            codename: focal
          - version: "22.04"
            codename: jammy
          - version: "24.04"
            codename: noble
          - version: "26.04"
            codename: resolute
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build package
        run: |
          ARCH="${{ matrix.arch }}"
          CODENAME="${{ matrix.ubuntu_version.codename }}"
          VERSION="${{ github.ref_name }}-1${CODENAME}"
          PLATFORM="linux/amd64"
          [ "$ARCH" = "arm64" ] && PLATFORM="linux/arm64/v8"

          WORKSPACE_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          REPO_DIR="$(basename "$GITHUB_WORKSPACE")"

          docker run --platform "$PLATFORM" --rm \
            -v "${WORKSPACE_PARENT}:/workspace" \
            -w "/workspace/${REPO_DIR}" \
            -e VERSION="${VERSION}" \
            -e CODENAME="${CODENAME}" \
            -e REPO_DIR="${REPO_DIR}" \
            ubuntu:"${CODENAME}" bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq build-essential devscripts debhelper dh-make libncurses-dev
            sed -i "1s/.*/ccm (${VERSION}) ${CODENAME}; urgency=medium/" debian/changelog
            dpkg-buildpackage -b -uc -us -d
            mkdir -p "/workspace/${REPO_DIR}/deb-output"
            find /workspace -maxdepth 1 \( -name "*.deb" -o -name "*.ddeb" \) -exec cp {} "/workspace/${REPO_DIR}/deb-output/" +
          '
        env:
          DEB_BUILD_OPTIONS: nocheck

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ccm-deb-${{ matrix.ubuntu_version.codename }}-${{ matrix.arch }}
          path: deb-output/
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-packages
          find artifacts -type f \( -name "*.deb" -o -name "*.ddeb" -o -name "*.dsc" \) | while read -r file; do
            cp "$file" release-packages/
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-packages/*
          generate_release_notes: true
